<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Block Puzzle Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>🧩 Block Puzzle Game</h1>

<canvas id="game"></canvas>

<div class="controls">
    <button onclick="move(-1)">⬅️</button>
    <button onclick="rotatePiece()">🔄</button>
    <button onclick="move(1)">➡️</button>
    <button onclick="drop()">⬇️</button>
    <button onclick="resetGame()">Reset</button>
</div>

<p>Keyboard: ⬅️ ➡️ ⬇️ ⬆️ + Press <b>R</b> to Reset</p>

<script src="script.js"></script>
</body>
</html>
